schema_version: paper-source-skill-routing-v1
source_of_truth: skills/routing.yaml
external_references:
  skill_architecture: {url: https://github.com/WoJiSama/skill-based-architecture, role: structure reference, local_adaptation: central routing}
  obsidian_skills: {url: https://github.com/kepano/obsidian-skills, role: Obsidian syntax authority, local_adaptation: property links and graph boundaries}
  freshness_policy: {rule: check current upstream or installed reference before changing structure or syntax rules}
session_discipline: {re_match_every_task: true, re_read_when: [route_changed, context_compacted, unsure]}
always_read: [../AGENTS.md, routing.yaml]
routes:
  config_setup: {category: primary, triggers: [配置 Paper Source, 初始化配置, 查看当前配置, 修改研究画像, missing config, update runtime config], skill: config-setup/SKILL.md, docs: [../docs/config.md]}
  paper_discovery: {category: primary, triggers: [用 PS 找论文, 找最新论文, 推荐优先阅读论文, Paper Source search, dry-run, discover-to-handoff], skill: paper-discovery/SKILL.md, workflows: [paper-discovery/workflows/run-discovery.md, paper-discovery/workflows/multi-source-discovery.md], notes: [profile-driven, not fixed-domain, hard-soft-query-plan]}
  research_grill_me:
    category: primary
    triggers: [clarify a research direction, 研究简报, 帮我梳理科研方向, 强追问科研问题, deep-research prompt]
    skill: research-grill-me/SKILL.md
    notes: [one decision point per turn, chat-visible deep-research prompt, Research Briefs override Research Profile for the current task, Research Briefs cannot bypass source-staging or Paper Wiki handoff gates]
  topic_tracking: {category: primary, triggers: [持续跟踪方向, 最近有什么新论文, backlog, coverage gap], skill: topic-tracking/SKILL.md, notes: [paper-discovery retrieves; topic-tracking owns the ledger]}
  paper_ingest: {category: primary, triggers: [用 PS 推进论文, 推进论文, 生成阅读报告, 准备 wiki handoff, prepare-ranked, discover-to-handoff, advance-paper], skill: paper-ingest/SKILL.md, workflows: [paper-ingest/workflows/prepare-ranked.md, paper-ingest/workflows/approval-and-trigger.md], notes: [source_bundle_audit blocks incomplete handoff, discover-to-handoff stops before approval, final prose defaults to Chinese]}
  mineru_paper_parser: {category: support, triggers: [MinerU 解析, PDF 转 Markdown, parse-paper, mineru-manifest.json, figure-index.json, formula-index.json, normalize-mineru-assets], skill: mineru-paper-parser/SKILL.md, notes: [raw asset normalization; formal figure repairs route to Paper Wiki]}
  paper_source_paper_deposition:
    category: maintenance
    triggers: [历史 handoff 修复, retired handoff cleanup, 重建 wiki-ingest-brief]
    skill: paper-source-paper-deposition/SKILL.md
    workflows: [paper-source-paper-deposition/workflows/formal-wiki-write.md]
    notes: [new formal wiki work routes to $paper-research-wiki, retired task files are historical cleanup objects only, formal_page_language_policy by paper-wiki-language]
  wiki_provenance: {category: support, triggers: [claim 能否回溯, 证据地址, provenance, final-source-review, record-wiki-ingest], skill: wiki-provenance/SKILL.md}
  run_lifecycle: {category: maintenance, triggers: [清理 runs, run index audit, dashboard pruning], skill: run-lifecycle/SKILL.md, notes: [index.json and research-queue.json use atomic writes]}
  wiki_setup: {category: primary, triggers: [PS 初始化 vault, 初始化 vault, 修复 vault, 重置 vault, graph visibility], skill: wiki-setup/SKILL.md, workflows: [wiki-setup/workflows/reset-repair.md], notes: [Paper Source owns bootstrap; Paper Wiki reports gaps here]}
  zotero_sync: {category: support, triggers: [同步 Zotero, 记录 Zotero 文献, Zotero, zotero-sync], skill: zotero-sync/SKILL.md, notes: [optional record-only integration unless configured]}
  skill_aware_evolve: {category: maintenance, triggers: [优化 Paper Source 插件, plugin eval, quality gates, propose-evolution], skill: skill-aware-evolve/SKILL.md, notes: [configuration changes stay record-only and route to config proposals]}
task_closure:
  applies_to: [code changes, docs changes, skill behavior changes]
  skip_for: [pure read-only Q&A]
  checklist: [original constraints, verification evidence, 30-second AAR]
codex_subagent_permission:
  rule: Codex may use subagents only when the user explicitly authorizes delegation or parallel agent work.
  preferred_use: [independent tests or audits, disjoint workflow-module edits, large grep or fixture scans]
  main_agent_reads: [final worker output, changed file list, verification result]
  main_agent_avoids: [large intermediate transcripts]
