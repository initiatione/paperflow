schema_version: prw-skill-routing-v1
source_of_truth: skills/routing.yaml
session_discipline:
  re_match_every_task: true
  re_read_when:
    - route_changed
    - context_compacted
    - unsure
always_read:
  - paper-research-wiki/references/epi-artifact-contract.md
  - paper-research-wiki/references/page-family-contract.md
  - ../rules/wiki-writing-standard.md
routes:
  extract_papers:
    category: primary
    triggers:
      - 用 PW 沉淀到 wiki
      - Paper Wiki deposition
      - PW deposit papers
      - 直接沉淀 EPI 抓下来的论文
      - 提取这些论文
      - 沉淀论文进 wiki
      - extract EPI papers
      - EPI paper deposition
    skill: paper-research-wiki/SKILL.md
    workflows:
      - paper-research-wiki/workflows/extract-papers.md
    references:
      - paper-research-wiki/references/page-provenance.md
    notes:
      - read paper-wiki-language before drafting or rewriting formal pages
      - ask one short confirmation question before formal writes
      - if missing vault structure blocks safe work, point back to Paper Source/EPI wiki-setup instead of initializing from Paper Wiki/PRW
  check_wiki:
    category: primary
    triggers:
      - 用 PW 检测 wiki
      - Paper Wiki check
      - PW check wiki
      - 检测 wiki 库
      - 检查论文 wiki
      - wiki 状态
      - check wiki
      - post-task check
    skill: paper-research-wiki/SKILL.md
    workflows:
      - paper-research-wiki/workflows/check-wiki.md
    notes:
      - default to Quick + Targeted unless systemic link or tag chaos appears
      - check EPI wiki-setup bootstrap structure and report missing vault structure as an EPI action
      - QMD is optional and must fall back to manifest and direct Markdown search
  ask_wiki:
    category: primary
    triggers:
      - 用 PW 问 wiki
      - Paper Wiki ask
      - PW ask wiki
      - 提问
      - 问 wiki
      - 问论文 wiki
      - 根据 wiki 回答
      - 查询论文 wiki
      - ask wiki
      - ask paper wiki
      - what does the wiki say
      - research question
    skill: paper-research-wiki/SKILL.md
    workflows:
      - paper-research-wiki/workflows/ask-wiki.md
    notes:
      - read-only formal Obsidian graph retrieval; do not write `log.md`, formal pages, QMD, or EPI artifacts
      - use QMD only as an optional accelerator and fallback to frontmatter, index, and direct Markdown search
      - report correction candidates and ask before repair
  redo_extraction:
    category: primary
    triggers:
      - 重做
      - 重新提取
      - 更详细提取
      - 批量重提取
      - 公式推理
      - 公式推理链
      - 图片证据
      - 图文结合
      - 图文证据卡
      - source map
      - source-map-first
      - source-map-grounded extraction
      - formula reasoning chains
      - evidence figure cards
      - redo
      - deep extraction
    skill: paper-research-wiki/SKILL.md
    workflows:
      - paper-research-wiki/workflows/redo-extraction.md
    references:
      - paper-research-wiki/references/page-provenance.md
    notes:
      - compare existing pages before staging replacement edits
      - do not write EPI human approval records
  update_wiki:
    category: primary
    triggers:
      - 用 PW 更新 wiki
      - Paper Wiki update
      - PW update wiki
      - 更新 wiki 库
      - 继续上次的论文沉淀
      - 重link
      - 重写某页
      - 重写页面
      - relink
      - update wiki
      - rewrite formal page
      - rewrite page
      - repair paper wiki links
    skill: paper-research-wiki/SKILL.md
    workflows:
      - paper-research-wiki/workflows/update-wiki.md
    references:
      - paper-research-wiki/references/upstream-obsidian-wiki-map.md
    notes:
      - repair links, aliases, tags, duplicate concept owners, and relationship drift in small batches
      - treat material formal page rewrites as graph-aware rewrite transactions with dependent-page impact analysis
      - rerun check-wiki after writing
  language_gate:
    category: support
    triggers:
      - 中文正式页
      - 语言质量
      - 机器翻译腔
      - polish formal paper wiki pages
      - language gate
    skill: paper-wiki-language/SKILL.md
    references:
      - paper-wiki-language/references/style-guide.md
    notes:
      - applies to any formal page draft, rewrite, repair, or material update
task_closure:
  applies_to:
    - formal page writes
    - link or tag repairs
    - provenance edits
    - tracking file updates
    - skill behavior changes
  skip_for:
    - pure read-only Q&A
    - ask_wiki read-only answers
  checklist:
    - run the matched workflow's post-task check
    - report QMD refreshed, skipped, or failed with fallback
    - report EPI record readiness or the exact remaining EPI action
    - route recurring failures into PRW rules, workflows, references, or tests
