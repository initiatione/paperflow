weights:
  topic_relevance: 0.35
  venue_quality: 0.18
  citation_signal: 0.15
  freshness: 0.10
  pdf_available: 0.08
  code_available: 0.08
  reproducibility_signal: 0.06
protocol:
  schema_version: epi-ranking-protocol-v1
  lenses:
    editorial: ["venue_tier", "freshness", "topic_relevance"]
    peer_review: ["citation_signal", "benchmark_signal", "pdf_available"]
    domain_fit: ["positive_keyword_overlap", "negative_keyword_penalty"]
    reproducibility: ["code_available", "reproducibility_terms"]
profile_fit:
  positive_keywords: "advance papers matching the user's research interests and profile"
  negative_keywords: "demote or review papers matching excluded topics"
venue_tiers:
  configured_top_venue: 1.0
  configured_strong_venue: 0.9
  configured_domain_venue: 0.8
